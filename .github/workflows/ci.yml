name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: '0.15.2'

      - name: Build
        run: zig build -Doptimize=ReleaseSafe
        shell: bash

      - name: Run tests
        run: zig build test
        shell: bash

      - name: Verify binary
        run: zig-out/bin/zvm version
        shell: bash

  lint:
    name: Format Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: '0.15.2'

      - name: Check formatting
        run: zig fmt --check src/
        shell: bash
